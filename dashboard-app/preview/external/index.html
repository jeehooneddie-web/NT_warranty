<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NT 보증팀 현황</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <style>
    body { font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif; background:#f8fafc; }
    .view { display:none; }
    .view.active { display:block; }
    .nav-btn { cursor:pointer; transition:all .15s; }
    .nav-btn.active { background:#1e40af; color:#fff; }
    .nav-btn:not(.active):hover { background:#e2e8f0; }
  </style>
</head>
<body class="min-h-screen">

  <!-- 상단 헤더 -->
  <header class="bg-white border-b border-slate-200 px-6 py-3 flex items-center justify-between sticky top-0 z-10 shadow-sm">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 bg-blue-700 rounded-lg flex items-center justify-center">
        <span class="text-white text-xs font-bold">NT</span>
      </div>
      <span class="font-semibold text-slate-800">보증팀 현황</span>
    </div>
    <span id="ext-update-date" class="text-xs text-slate-400"></span>
  </header>

  <!-- 뷰 탭 네비게이션 -->
  <div id="ext-nav" class="bg-white border-b border-slate-100 px-4 flex gap-1 overflow-x-auto">
  </div>

  <!-- 뷰 컨테이너 -->
  <main class="p-4 max-w-7xl mx-auto">
    <div id="ext-loading" class="text-center py-20 text-slate-400 text-sm">현황 데이터 로딩 중...</div>
    <div id="ext-content"></div>
  </main>

<!-- ═══════════════════════════════════════════════════
     데이터 변수 (update_all.py 가 embed)
════════════════════════════════════════════════════ -->
<script>
const EXT_BRANCH_DATA={};
const EXT_DEFECT_RAW=[];
const EXT_TC_DATA={};
const EXT_CLAIM_DATA=[];
const EXT_WHOLESALE_DATA={};
const EXT_QR_CLAIM_DATA=[];
const EXT_UPDATE_DATE='2026-05-13 16:50';
</script>

<!-- ═══════════════════════════════════════════════════
     메인 스크립트
════════════════════════════════════════════════════ -->
<script>
const SUPABASE_URL = 'https://vbvghhtroitmroxmfepr.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZidmdoaHRyb2l0bXJveG1mZXByIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4MTAxMjEsImV4cCI6MjA5MDM4NjEyMX0.2sq5uGj4j6Fm_IgztrucJv5bbXyk4ZXkWeZxnDMjhZg';

const VIEW_LABELS = {
  'view-sales':      '보증 매출',
  'view-top-defect': 'TOP DEFECT',
  'view-tc':         'TC 미실시율',
  'view-claim':      'CLAIM 현황',
  'view-wholesale':  '클레임 볼륨',
  'view-qr-match':   '고품 반납 현황',
};

let _activeView = null;
let _externalViews = [];

// ── Supabase에서 external=true 뷰 목록 로드 ──
async function loadExternalViews() {
  try {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/menu_settings?select=key,external&external=eq.true`, {
      headers: { 'apikey': SUPABASE_KEY }
    });
    const rows = await r.json();
    if (Array.isArray(rows) && rows.length > 0) {
      return rows.map(r => r.key).filter(k => VIEW_LABELS[k]);
    }
  } catch(e) {}
  return [];
}

// ── 뷰 탭 렌더 ──
function renderNav(views) {
  const nav = document.getElementById('ext-nav');
  nav.innerHTML = views.map(v => `
    <button class="nav-btn px-4 py-3 text-sm font-medium text-slate-600 whitespace-nowrap rounded-t ${v === views[0] ? 'active' : ''}"
      onclick="showExtView('${v}')">${VIEW_LABELS[v] || v}</button>
  `).join('');
}

// ── 뷰 전환 ──
function showExtView(viewId) {
  _activeView = viewId;
  document.querySelectorAll('.nav-btn').forEach(b => {
    b.classList.toggle('active', b.textContent.trim() === (VIEW_LABELS[viewId] || viewId));
  });
  renderView(viewId);
}

// ── 뷰별 렌더 ──
function renderView(viewId) {
  const content = document.getElementById('ext-content');
  if (viewId === 'view-sales')      renderSales(content);
  else if (viewId === 'view-top-defect') renderTopDefect(content);
  else if (viewId === 'view-tc')    renderTc(content);
  else if (viewId === 'view-claim') renderClaim(content);
  else if (viewId === 'view-wholesale') renderWholesale(content);
  else if (viewId === 'view-qr-match')  renderQrMatch(content);
  else content.innerHTML = `<p class="text-slate-400 text-sm p-8">준비 중입니다.</p>`;
}

// ── 보증 매출 ──
function renderSales(el) {
  if (!EXT_BRANCH_DATA || !Object.keys(EXT_BRANCH_DATA).length) {
    el.innerHTML = noData(); return;
  }
  const branches = Object.keys(EXT_BRANCH_DATA);
  const months = [...new Set(branches.flatMap(b => Object.keys(EXT_BRANCH_DATA[b])))].sort();
  const latest = months[months.length - 1] || '';
  let rows = branches.map(b => {
    const m = EXT_BRANCH_DATA[b][latest] || {};
    const total = Object.values(m).reduce((s, v) => s + (v.total||0), 0);
    const count = Object.values(m).reduce((s, v) => s + (v.count||0), 0);
    return { b, total, count };
  }).sort((a,b) => b.total - a.total);
  el.innerHTML = `
    <div class="mb-4"><span class="text-xs text-slate-400">기준: ${latest} / 단위: 원</span></div>
    <div class="bg-white rounded-xl shadow-sm border border-slate-100 overflow-hidden">
      <table class="w-full text-sm">
        <thead><tr class="bg-slate-50 text-xs text-slate-500 uppercase">
          <th class="px-4 py-3 text-left">지점</th>
          <th class="px-4 py-3 text-right">건수</th>
          <th class="px-4 py-3 text-right">금액</th>
        </tr></thead>
        <tbody class="divide-y divide-slate-100">
          ${rows.map(r => `<tr>
            <td class="px-4 py-3 font-medium">${r.b}</td>
            <td class="px-4 py-3 text-right text-slate-600">${r.count.toLocaleString()}</td>
            <td class="px-4 py-3 text-right font-semibold text-blue-700">${r.total.toLocaleString()}</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>`;
}

// ── TOP DEFECT ──
function renderTopDefect(el) {
  if (!EXT_DEFECT_RAW || !EXT_DEFECT_RAW.length) { el.innerHTML = noData(); return; }
  const map = {};
  EXT_DEFECT_RAW.forEach(([,, , defect, cnt, amt]) => {
    if (!map[defect]) map[defect] = { cnt:0, amt:0 };
    map[defect].cnt += cnt; map[defect].amt += amt;
  });
  const top20 = Object.entries(map).sort((a,b) => b[1].cnt - a[1].cnt).slice(0,20);
  el.innerHTML = `
    <div class="bg-white rounded-xl shadow-sm border border-slate-100 overflow-hidden">
      <table class="w-full text-sm">
        <thead><tr class="bg-slate-50 text-xs text-slate-500 uppercase">
          <th class="px-4 py-3 text-left">#</th>
          <th class="px-4 py-3 text-left">코드</th>
          <th class="px-4 py-3 text-right">건수</th>
          <th class="px-4 py-3 text-right">금액</th>
        </tr></thead>
        <tbody class="divide-y divide-slate-100">
          ${top20.map(([code, v], i) => `<tr>
            <td class="px-4 py-3 text-slate-400 text-xs">${i+1}</td>
            <td class="px-4 py-3 font-mono text-xs">${code}</td>
            <td class="px-4 py-3 text-right">${v.cnt.toLocaleString()}</td>
            <td class="px-4 py-3 text-right text-blue-700">${v.amt.toLocaleString()}</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>`;
}

// ── TC 미실시율 ──
function renderTc(el) {
  if (!EXT_TC_DATA || !Object.keys(EXT_TC_DATA).length) { el.innerHTML = noData(); return; }
  const branches = Object.keys(EXT_TC_DATA);
  const months = [...new Set(branches.flatMap(b => Object.keys(EXT_TC_DATA[b])))].sort();
  const latest = months[months.length-1] || '';
  const rows = branches.map(b => {
    const m = EXT_TC_DATA[b][latest] || {};
    const rate = m.total ? (m.n_count / m.total * 100).toFixed(1) : '-';
    return { b, total: m.total||0, n: m.n_count||0, rate };
  });
  el.innerHTML = `
    <div class="mb-4"><span class="text-xs text-slate-400">기준: ${latest}</span></div>
    <div class="bg-white rounded-xl shadow-sm border border-slate-100 overflow-hidden">
      <table class="w-full text-sm">
        <thead><tr class="bg-slate-50 text-xs text-slate-500 uppercase">
          <th class="px-4 py-3 text-left">지점</th>
          <th class="px-4 py-3 text-right">전체</th>
          <th class="px-4 py-3 text-right">미실시</th>
          <th class="px-4 py-3 text-right">미실시율</th>
        </tr></thead>
        <tbody class="divide-y divide-slate-100">
          ${rows.map(r => `<tr>
            <td class="px-4 py-3 font-medium">${r.b}</td>
            <td class="px-4 py-3 text-right">${r.total.toLocaleString()}</td>
            <td class="px-4 py-3 text-right text-red-600">${r.n.toLocaleString()}</td>
            <td class="px-4 py-3 text-right font-semibold ${parseFloat(r.rate)>50?'text-red-600':'text-slate-700'}">${r.rate}%</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>`;
}

// ── CLAIM 현황 ──
function renderClaim(el) {
  if (!EXT_CLAIM_DATA || !EXT_CLAIM_DATA.length) { el.innerHTML = noData(); return; }
  const statusMap = { '불승인':'bg-red-100 text-red-700', '보완요청':'bg-amber-100 text-amber-700', '보완완료':'bg-emerald-100 text-emerald-700' };
  const recent = EXT_CLAIM_DATA.slice(0, 50);
  el.innerHTML = `
    <div class="mb-2 text-xs text-slate-400">최근 50건 표시</div>
    <div class="bg-white rounded-xl shadow-sm border border-slate-100 overflow-x-auto">
      <table class="w-full text-sm">
        <thead><tr class="bg-slate-50 text-xs text-slate-500 uppercase">
          <th class="px-4 py-3 text-left">클레임번호</th>
          <th class="px-4 py-3 text-left">지점</th>
          <th class="px-4 py-3 text-center">상태</th>
          <th class="px-4 py-3 text-right">금액</th>
        </tr></thead>
        <tbody class="divide-y divide-slate-100">
          ${recent.map(r => `<tr>
            <td class="px-4 py-3 font-mono text-xs">${r[0]||''}</td>
            <td class="px-4 py-3">${r[1]||''}</td>
            <td class="px-4 py-3 text-center">
              <span class="px-2 py-0.5 rounded text-xs font-medium ${statusMap[r[2]]||'bg-slate-100 text-slate-500'}">${r[2]||''}</span>
            </td>
            <td class="px-4 py-3 text-right text-blue-700">${(r[7]||0).toLocaleString()}</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>`;
}

// ── 클레임 볼륨 (간략) ──
function renderWholesale(el) {
  if (!EXT_WHOLESALE_DATA || !Object.keys(EXT_WHOLESALE_DATA).length) { el.innerHTML = noData(); return; }
  el.innerHTML = `<p class="text-slate-500 text-sm p-4">클레임 볼륨 데이터가 로드되었습니다. 상세 조회는 내부 대시보드를 이용해주세요.</p>`;
}

// ── 고품 반납 현황 (간략) ──
function renderQrMatch(el) {
  if (!EXT_QR_CLAIM_DATA || !EXT_QR_CLAIM_DATA.length) { el.innerHTML = noData(); return; }
  el.innerHTML = `
    <div class="bg-white rounded-xl shadow-sm border border-slate-100 p-6">
      <p class="text-2xl font-bold text-blue-700">${EXT_QR_CLAIM_DATA.length.toLocaleString()}<span class="text-base font-normal text-slate-400 ml-1">건</span></p>
      <p class="text-sm text-slate-500 mt-1">2026년 고품 반납 대상 클레임</p>
    </div>`;
}

function noData() {
  return `<div class="text-center py-16 text-slate-300 text-sm">데이터가 없습니다.</div>`;
}

// ── 초기화 ──
(async () => {
  if (EXT_UPDATE_DATE) document.getElementById('ext-update-date').textContent = `최종 업데이트: ${EXT_UPDATE_DATE}`;
  _externalViews = await loadExternalViews();
  const loading = document.getElementById('ext-loading');
  if (!_externalViews.length) {
    loading.textContent = '현재 공개된 뷰가 없습니다. 관리자에게 문의하세요.';
    return;
  }
  loading.style.display = 'none';
  renderNav(_externalViews);
  showExtView(_externalViews[0]);
})();
</script>
</body>
</html>
