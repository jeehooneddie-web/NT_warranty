<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NT 보증팀 현황</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <style>
    body { font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif; background:#f8fafc; }
    .nav-btn { cursor:pointer; transition:all .15s; }
    .nav-btn.active { background:#1e40af; color:#fff; }
    .nav-btn:not(.active):hover { background:#e2e8f0; }
  </style>
</head>
<body class="min-h-screen">
  <header class="bg-white border-b border-slate-200 px-6 py-3 flex items-center justify-between sticky top-0 z-10 shadow-sm">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 bg-blue-700 rounded-lg flex items-center justify-center">
        <span class="text-white text-xs font-bold">NT</span>
      </div>
      <span class="font-semibold text-slate-800">보증팀 현황</span>
    </div>
    <span id="ext-update-date" class="text-xs text-slate-400"></span>
  </header>
  <div id="ext-nav" class="bg-white border-b border-slate-100 px-4 flex gap-1 overflow-x-auto"></div>
  <main class="p-4 max-w-7xl mx-auto">
    <div id="ext-loading" class="text-center py-20 text-slate-400 text-sm">현황 데이터 로딩 중...</div>
    <div id="ext-content"></div>
  </main>
<script>
const EXT_BRANCH_DATA={};
const EXT_DEFECT_RAW=[];
const EXT_TC_DATA={};
const EXT_CLAIM_DATA=[];
const EXT_WHOLESALE_DATA={};
const EXT_QR_CLAIM_DATA=[];
const EXT_UPDATE_DATE='';
</script>
<script>
const SUPABASE_URL = 'https://vbvghhtroitmroxmfepr.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZidmdoaHRyb2l0bXJveG1mZXByIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4MTAxMjEsImV4cCI6MjA5MDM4NjEyMX0.2sq5uGj4j6Fm_IgztrucJv5bbXyk4ZXkWeZxnDMjhZg';

const TYPES = ['BSI','Warranty','TC/RECALL','Goodwill','WP','LOCAL TC'];
const TYPE_COLORS = {
  'BSI':'#3B82F6','Warranty':'#0891b2','TC/RECALL':'#059669',
  'Goodwill':'#7c3aed','WP':'#d97706','LOCAL TC':'#dc2626'
};
const TC_TARGET = 35;

const VIEW_LABELS = {
  'view-sales':      '보증 매출',
  'view-top-defect': 'TOP DEFECT',
  'view-tc':         'TC 미실시율',
  'view-claim':      'CLAIM 현황',
  'view-wholesale':  '클레임 볼륨',
  'view-qr-match':   '고품 반납 현황',
};

let _activeView = null;
let _externalViews = [];
let _charts = {};

function _destroyChart(id) {
  if (_charts[id]) { _charts[id].destroy(); delete _charts[id]; }
}

async function loadExternalViews() {
  try {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/menu_settings?select=key,external&external=eq.true`, {
      headers: { 'apikey': SUPABASE_KEY }
    });
    const rows = await r.json();
    if (Array.isArray(rows) && rows.length > 0)
      return rows.map(r => r.key).filter(k => VIEW_LABELS[k]);
  } catch(e) {}
  return [];
}

function renderNav(views) {
  const nav = document.getElementById('ext-nav');
  nav.innerHTML = views.map(v =>
    '<button class="nav-btn px-4 py-3 text-sm font-medium text-slate-600 whitespace-nowrap rounded-t ' +
    (v === views[0] ? 'active' : '') +
    '" onclick="showExtView(\'' + v + '\')">' + (VIEW_LABELS[v] || v) + '</button>'
  ).join('');
}

function showExtView(viewId) {
  _activeView = viewId;
  document.querySelectorAll('.nav-btn').forEach(b => {
    b.classList.toggle('active', b.textContent.trim() === (VIEW_LABELS[viewId] || viewId));
  });
  renderView(viewId);
}

function renderView(viewId) {
  const content = document.getElementById('ext-content');
  if      (viewId === 'view-sales')      renderSales(content);
  else if (viewId === 'view-top-defect') renderTopDefect(content);
  else if (viewId === 'view-tc')         renderTc(content);
  else if (viewId === 'view-claim')      renderClaim(content);
  else if (viewId === 'view-wholesale')  renderWholesale(content);
  else if (viewId === 'view-qr-match')   renderQrMatch(content);
  else content.innerHTML = '<p class="text-slate-400 text-sm p-8">준비 중입니다.</p>';
}

// ── 보증 매출 ──
function renderSales(el) {
  if (!EXT_BRANCH_DATA || !Object.keys(EXT_BRANCH_DATA).length) { el.innerHTML = noData(); return; }
  const branches = Object.keys(EXT_BRANCH_DATA);
  const allMonths = [...new Set(branches.flatMap(b => Object.keys(EXT_BRANCH_DATA[b])))].sort();
  const latest = allMonths[allMonths.length - 1] || '';
  const aggByMonth = {};
  allMonths.forEach(function(m) {
    aggByMonth[m] = {};
    TYPES.forEach(function(t) {
      aggByMonth[m][t] = branches.reduce(function(s, b) {
        return s + (EXT_BRANCH_DATA[b] && EXT_BRANCH_DATA[b][m] && EXT_BRANCH_DATA[b][m][t] ? EXT_BRANCH_DATA[b][m][t].total : 0);
      }, 0);
    });
  });
  const kpiCards = branches.map(function(b) {
    const m = EXT_BRANCH_DATA[b][latest] || {};
    const total = Object.values(m).reduce(function(s, v) { return s + (v.total || 0); }, 0);
    const count = Object.values(m).reduce(function(s, v) { return s + (v.count || 0); }, 0);
    const fmt = total >= 1e8 ? (total / 1e8).toFixed(2) + '억' : Math.round(total / 1e6).toLocaleString() + 'M';
    return '<div class="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">'
      + '<div class="text-xs text-slate-400 font-semibold uppercase mb-1">' + b + '</div>'
      + '<div class="text-xl font-bold text-blue-700">' + fmt + '</div>'
      + '<div class="text-xs text-slate-400 mt-0.5">' + count.toLocaleString() + '건</div></div>';
  }).join('');
  const typeHeaders = TYPES.map(function(t) { return '<th class="px-3 py-3 text-right whitespace-nowrap">' + t + '</th>'; }).join('');
  const tableRows = allMonths.slice().reverse().map(function(m, i) {
    const agg = aggByMonth[m];
    const rowTotal = TYPES.reduce(function(s, t) { return s + (agg[t] || 0); }, 0);
    const bg = i % 2 ? 'bg-slate-50/40' : '';
    const cells = TYPES.map(function(t) {
      const v = agg[t] || 0;
      return '<td class="px-3 py-2 text-right tabular-nums text-slate-600">' + (v ? Math.round(v/10000).toLocaleString() : '—') + '</td>';
    }).join('');
    return '<tr class="' + bg + ' hover:bg-blue-50/30">'
      + '<td class="px-4 py-2 font-medium text-slate-700 whitespace-nowrap">\'' + m + '</td>'
      + cells + '<td class="px-4 py-2 text-right font-bold text-blue-700 tabular-nums">' + Math.round(rowTotal/10000).toLocaleString() + '</td></tr>';
  }).join('');
  _destroyChart('sales');
  el.innerHTML = '<div class="mb-1 text-xs text-slate-400">기준: ' + latest + ' | 단위: 만원</div>'
    + '<div class="grid grid-cols-3 sm:grid-cols-5 gap-3 my-4">' + kpiCards + '</div>'
    + '<div class="bg-white rounded-xl border border-slate-100 shadow-sm p-4 mb-5">'
    + '<div class="text-sm font-semibold text-slate-700 mb-3">월별 보증 매출 추이</div>'
    + '<div style="height:260px"><canvas id="ext-sales-chart"></canvas></div></div>'
    + '<div class="bg-white rounded-xl border border-slate-100 shadow-sm overflow-x-auto">'
    + '<table class="w-full text-sm"><thead><tr class="bg-slate-50 text-xs text-slate-500">'
    + '<th class="px-4 py-3 text-left">월</th>' + typeHeaders
    + '<th class="px-4 py-3 text-right font-semibold">합계</th>'
    + '</tr></thead><tbody class="divide-y divide-slate-100">' + tableRows + '</tbody></table></div>';
  setTimeout(function() {
    const ctx = document.getElementById('ext-sales-chart');
    if (!ctx) return;
    const datasets = TYPES.map(function(t) {
      return { label: t, data: allMonths.map(function(m) { return Math.round((aggByMonth[m][t] || 0) / 1e6); }),
        backgroundColor: TYPE_COLORS[t] + 'cc', borderColor: TYPE_COLORS[t], borderWidth: 1 };
    });
    _charts['sales'] = new Chart(ctx, {
      type: 'bar',
      data: { labels: allMonths.map(function(m) { return "'" + m; }), datasets: datasets },
      options: {
        responsive: true, maintainAspectRatio: false,
        scales: {
          x: { stacked: true, grid: { display: false }, ticks: { font: { size: 10 } } },
          y: { stacked: true, ticks: { callback: function(v) { return v.toLocaleString() + 'M'; }, font: { size: 10 } } }
        },
        plugins: {
          legend: { position: 'bottom', labels: { boxWidth: 10, padding: 12, font: { size: 11 } } },
          tooltip: { callbacks: { label: function(c) { return ' ' + c.dataset.label + ': ' + c.raw.toLocaleString() + '백만원'; } } }
        }
      }
    });
  }, 0);
}

// ── TOP DEFECT ──
function renderTopDefect(el) {
  if (!EXT_DEFECT_RAW || !EXT_DEFECT_RAW.length) { el.innerHTML = noData(); return; }
  const map = {};
  EXT_DEFECT_RAW.forEach(function(row) {
    const tp = row[2], code = row[3], cnt = row[4], amt = row[5];
    if (!map[code]) map[code] = { cnt: 0, amt: 0, types: {} };
    map[code].cnt += cnt; map[code].amt += amt;
    map[code].types[tp] = (map[code].types[tp] || 0) + cnt;
  });
  const sorted = Object.entries(map).sort(function(a, b) { return b[1].cnt - a[1].cnt; });
  const top20 = sorted.slice(0, 20);
  const top10 = sorted.slice(0, 10);
  const tableRows = top20.map(function(entry, i) {
    const code = entry[0], v = entry[1];
    const bg = i % 2 ? 'bg-slate-50/40' : '';
    return '<tr class="' + bg + ' hover:bg-blue-50/30">'
      + '<td class="px-3 py-2 text-center text-slate-400 text-xs font-bold">' + (i+1) + '</td>'
      + '<td class="px-4 py-2 font-mono text-xs text-slate-700">' + code + '</td>'
      + '<td class="px-4 py-2 text-right font-semibold tabular-nums">' + v.cnt.toLocaleString() + '</td>'
      + '<td class="px-4 py-2 text-right text-blue-700 tabular-nums">' + Math.round(v.amt/10000).toLocaleString() + '</td></tr>';
  }).join('');
  _destroyChart('defect');
  el.innerHTML = '<div class="bg-white rounded-xl border border-slate-100 shadow-sm p-4 mb-5">'
    + '<div class="text-sm font-semibold text-slate-700 mb-3">TOP 10 디펙트 (건수 기준)</div>'
    + '<div style="height:300px"><canvas id="ext-defect-chart"></canvas></div></div>'
    + '<div class="bg-white rounded-xl border border-slate-100 shadow-sm overflow-hidden">'
    + '<table class="w-full text-sm"><thead><tr class="bg-slate-50 text-xs text-slate-500">'
    + '<th class="px-3 py-3 text-center">#</th><th class="px-4 py-3 text-left">디펙트 코드</th>'
    + '<th class="px-4 py-3 text-right">건수</th><th class="px-4 py-3 text-right">금액(만)</th>'
    + '</tr></thead><tbody class="divide-y divide-slate-100">' + tableRows + '</tbody></table></div>';
  setTimeout(function() {
    const ctx = document.getElementById('ext-defect-chart');
    if (!ctx) return;
    const labels = top10.map(function(e) { return e[0]; });
    const datasets = TYPES.map(function(t) {
      return { label: t, data: top10.map(function(e) { return e[1].types[t] || 0; }),
        backgroundColor: TYPE_COLORS[t] + 'cc', borderWidth: 0 };
    });
    _charts['defect'] = new Chart(ctx, {
      type: 'bar', data: { labels: labels, datasets: datasets },
      options: {
        indexAxis: 'y', responsive: true, maintainAspectRatio: false,
        scales: {
          x: { stacked: true, ticks: { font: { size: 10 } } },
          y: { stacked: true, ticks: { font: { size: 10 } } }
        },
        plugins: {
          legend: { position: 'bottom', labels: { boxWidth: 10, padding: 10, font: { size: 11 } } },
          tooltip: { callbacks: { label: function(c) { return ' ' + c.dataset.label + ': ' + c.raw.toLocaleString() + '건'; } } }
        }
      }
    });
  }, 0);
}

// ── TC 미실시율 ──
function renderTc(el) {
  if (!EXT_TC_DATA || !Object.keys(EXT_TC_DATA).length) { el.innerHTML = noData(); return; }
  const branches = Object.keys(EXT_TC_DATA);
  const allMonths = [...new Set(branches.flatMap(b => Object.keys(EXT_TC_DATA[b])))].sort();
  const latest = allMonths[allMonths.length - 1] || '';
  const branchStats = branches.map(function(b) {
    const m = EXT_TC_DATA[b][latest] || {};
    const rate = m.total ? parseFloat((m.n_count / m.total * 100).toFixed(1)) : null;
    return { b: b, total: m.total || 0, n: m.n_count || 0, rate: rate };
  });
  const kpiCards = branchStats.map(function(s) {
    const above = s.rate !== null && s.rate > TC_TARGET;
    const rateStr = s.rate !== null ? s.rate + '%' : '-';
    const borderClr = above ? '#fca5a5' : '#93c5fd';
    const valClr = above ? '#f87171' : '#60a5fa';
    return '<div class="bg-white rounded-xl border border-slate-200 shadow-sm p-4" style="border-left:4px solid ' + borderClr + '">'
      + '<div class="text-xs text-slate-400 font-semibold uppercase mb-1">' + s.b + '</div>'
      + '<div class="text-2xl font-bold" style="color:' + valClr + '">' + rateStr + '</div>'
      + '<div class="text-xs text-slate-400 mt-1">미실시 ' + s.n.toLocaleString() + ' / ' + s.total.toLocaleString() + '</div></div>';
  }).join('');
  const tableRows = branchStats.map(function(s) {
    const above = s.rate !== null && s.rate > TC_TARGET;
    const rateStr = s.rate !== null ? s.rate + '%' : '-';
    return '<tr class="hover:bg-slate-50">'
      + '<td class="px-4 py-2 font-medium text-slate-700">' + s.b + '</td>'
      + '<td class="px-4 py-2 text-right tabular-nums text-slate-600">' + s.total.toLocaleString() + '</td>'
      + '<td class="px-4 py-2 text-right tabular-nums text-red-500">' + s.n.toLocaleString() + '</td>'
      + '<td class="px-4 py-2 text-right font-bold tabular-nums ' + (above ? 'text-red-500' : 'text-emerald-600') + '">' + rateStr + '</td></tr>';
  }).join('');
  _destroyChart('tc');
  el.innerHTML = '<div class="mb-1 text-xs text-slate-400">기준: ' + latest + ' | 목표: ' + TC_TARGET + '% 이하</div>'
    + '<div class="grid grid-cols-3 sm:grid-cols-5 gap-3 my-4">' + kpiCards + '</div>'
    + '<div class="bg-white rounded-xl border border-slate-100 shadow-sm p-4 mb-5">'
    + '<div class="text-sm font-semibold text-slate-700 mb-3">지점별 TC 미실시율</div>'
    + '<div style="height:220px"><canvas id="ext-tc-chart"></canvas></div></div>'
    + '<div class="bg-white rounded-xl border border-slate-100 shadow-sm overflow-hidden">'
    + '<table class="w-full text-sm"><thead><tr class="bg-slate-50 text-xs text-slate-500">'
    + '<th class="px-4 py-3 text-left">지점</th><th class="px-4 py-3 text-right">전체</th>'
    + '<th class="px-4 py-3 text-right">미실시</th><th class="px-4 py-3 text-right">미실시율</th>'
    + '</tr></thead><tbody class="divide-y divide-slate-100">' + tableRows + '</tbody></table></div>';
  setTimeout(function() {
    const ctx = document.getElementById('ext-tc-chart');
    if (!ctx) return;
    const rates = branchStats.map(function(s) { return s.rate !== null ? s.rate : 0; });
    const colors = rates.map(function(r) { return r > TC_TARGET ? '#fca5a5' : '#a5b4fc'; });
    const drawPlugin = {
      id: 'tcTarget',
      afterDraw: function(chart) {
        const c = chart.ctx, ca = chart.chartArea, y = chart.scales.y;
        if (!y || !ca) return;
        const yPx = y.getPixelForValue(TC_TARGET);
        c.save();
        c.beginPath(); c.strokeStyle = '#ef4444'; c.lineWidth = 2; c.setLineDash([6, 3]);
        c.moveTo(ca.left, yPx); c.lineTo(ca.right, yPx); c.stroke(); c.setLineDash([]);
        c.fillStyle = '#ef4444'; c.font = 'bold 11px sans-serif';
        c.textAlign = 'right'; c.textBaseline = 'bottom';
        c.fillText('목표 ' + TC_TARGET + '%', ca.right, yPx - 4);
        c.restore();
      }
    };
    _charts['tc'] = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: branchStats.map(function(s) { return s.b; }),
        datasets: [{ label: '미실시율(%)', data: rates, backgroundColor: colors, borderRadius: 6, maxBarThickness: 80 }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        scales: {
          y: { max: 100, ticks: { callback: function(v) { return v + '%'; }, font: { size: 10 } } },
          x: { ticks: { font: { size: 11 } } }
        },
        plugins: {
          legend: { display: false },
          tooltip: { callbacks: { label: function(c) { return ' ' + c.raw + '%'; } } }
        }
      },
      plugins: [drawPlugin]
    });
  }, 0);
}

// ── CLAIM 현황 ──
function renderClaim(el) {
  if (!EXT_CLAIM_DATA || !EXT_CLAIM_DATA.length) { el.innerHTML = noData(); return; }
  const statusMap = { '불승인':'bg-red-100 text-red-700', '보완요청':'bg-amber-100 text-amber-700', '보완완료':'bg-emerald-100 text-emerald-700' };
  const rows = EXT_CLAIM_DATA.slice(0, 50).map(function(r) {
    const cls = statusMap[r[2]] || 'bg-slate-100 text-slate-500';
    return '<tr><td class="px-4 py-3 font-mono text-xs">' + (r[0]||'') + '</td>'
      + '<td class="px-4 py-3">' + (r[1]||'') + '</td>'
      + '<td class="px-4 py-3 text-center"><span class="px-2 py-0.5 rounded text-xs font-medium ' + cls + '">' + (r[2]||'') + '</span></td>'
      + '<td class="px-4 py-3 text-right text-blue-700">' + (r[7]||0).toLocaleString() + '</td></tr>';
  }).join('');
  el.innerHTML = '<div class="mb-2 text-xs text-slate-400">최근 50건 표시</div>'
    + '<div class="bg-white rounded-xl shadow-sm border border-slate-100 overflow-x-auto">'
    + '<table class="w-full text-sm"><thead><tr class="bg-slate-50 text-xs text-slate-500 uppercase">'
    + '<th class="px-4 py-3 text-left">클레임번호</th><th class="px-4 py-3 text-left">지점</th>'
    + '<th class="px-4 py-3 text-center">상태</th><th class="px-4 py-3 text-right">금액</th>'
    + '</tr></thead><tbody class="divide-y divide-slate-100">' + rows + '</tbody></table></div>';
}

function renderWholesale(el) {
  if (!EXT_WHOLESALE_DATA || !Object.keys(EXT_WHOLESALE_DATA).length) { el.innerHTML = noData(); return; }
  el.innerHTML = '<p class="text-slate-500 text-sm p-4">클레임 볼륨 데이터가 로드되었습니다. 상세 조회는 내부 대시보드를 이용해주세요.</p>';
}

function renderQrMatch(el) {
  if (!EXT_QR_CLAIM_DATA || !EXT_QR_CLAIM_DATA.length) { el.innerHTML = noData(); return; }
  el.innerHTML = '<div class="bg-white rounded-xl shadow-sm border border-slate-100 p-6">'
    + '<p class="text-2xl font-bold text-blue-700">' + EXT_QR_CLAIM_DATA.length.toLocaleString()
    + '<span class="text-base font-normal text-slate-400 ml-1">건</span></p>'
    + '<p class="text-sm text-slate-500 mt-1">2026년 고품 반납 대상 클레임</p></div>';
}

function noData() {
  return '<div class="text-center py-16 text-slate-300 text-sm">데이터가 없습니다.</div>';
}

(async function() {
  if (EXT_UPDATE_DATE) document.getElementById('ext-update-date').textContent = '최종 업데이트: ' + EXT_UPDATE_DATE;
  _externalViews = await loadExternalViews();
  const loading = document.getElementById('ext-loading');
  if (!_externalViews.length) {
    loading.textContent = '현재 공개된 뷰가 없습니다. 관리자에게 문의하세요.';
    return;
  }
  loading.style.display = 'none';
  renderNav(_externalViews);
  showExtView(_externalViews[0]);
})();
</script>
</body>
</html>
